<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FlowTrackr | Calendar</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .calendar-container { background: var(--card-bg); border: 1px solid var(--border); border-radius: 32px; padding: 30px; }
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .grid-7 { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; text-align: center; }
        .day-label { font-size: 0.8rem; color: var(--text-dim); font-weight: 700; margin-bottom: 10px; }
        .day-cell { 
            aspect-ratio: 1/1; 
            background: rgba(255,255,255,0.02); 
            border-radius: 12px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            border: 1px solid transparent;
            transition: 0.2s;
            position: relative;
        }
        .day-cell:hover { background: rgba(255,255,255,0.05); border-color: var(--border); cursor: pointer; }
        .today { border-color: var(--accent); background: rgba(157, 124, 255, 0.05); }
        .dot { width: 6px; height: 6px; border-radius: 50%; position: absolute; bottom: 8px; }
        .dot-red { background: #ff4d6d; }
        .dot-yellow { background: #ffb703; }
    </style>
</head>
<body>
    <nav>
        <div class="logo-container"><h1>FlowTrackr</h1></div>
        <div class="nav-links">
            <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-house"></i> Dashboard</a>
            <a href="tasks.html" class="nav-item"><i class="fa-solid fa-list-check"></i> Tasks</a>
            <a href="homework.html" class="nav-item"><i class="fa-solid fa-book"></i> Homework</a>
            <a href="calendar.html" class="nav-item active"><i class="fa-solid fa-calendar-days"></i> Calendar</a>
            <a href="planner.html" class="nav-item"><i class="fa-solid fa-wand-magic-sparkles"></i> AI Planner</a>
            <a href="settings.html" class="nav-item"><i class="fa-solid fa-gear"></i> Settings</a>
        </div>
    </nav>

    <main>
        <header>
            <h2>Calendar</h2>
            <p>March 2026</p>
        </header>

        <div class="calendar-container">
            <div class="cal-header">
                <h3 id="currentMonth">March 2026</h3>
                <div style="display: flex; gap: 10px;">
                    <button style="background:none; border:1px solid var(--border); color:white; padding:8px 12px; border-radius:8px; cursor:pointer;"><i class="fa-solid fa-chevron-left"></i></button>
                    <button style="background:none; border:1px solid var(--border); color:white; padding:8px 12px; border-radius:8px; cursor:pointer;"><i class="fa-solid fa-chevron-right"></i></button>
                </div>
            </div>

            <div class="grid-7">
                <div class="day-label">MON</div><div class="day-label">TUE</div><div class="day-label">WED</div>
                <div class="day-label">THU</div><div class="day-label">FRI</div><div class="day-label">SAT</div><div class="day-label">SUN</div>
                
                <div class="day-cell" style="opacity: 0.3;">23</div><div class="day-cell" style="opacity: 0.3;">24</div><div class="day-cell" style="opacity: 0.3;">25</div>
                <div class="day-cell" style="opacity: 0.3;">26</div><div class="day-cell" style="opacity: 0.3;">27</div><div class="day-cell" style="opacity: 0.3;">28</div><div class="day-cell">1</div>
                
                <div class="day-cell">2</div><div class="day-cell">3</div><div class="day-cell">4</div><div class="day-cell">5</div><div class="day-cell">6</div><div class="day-cell">7</div><div class="day-cell">8</div>
                <div class="day-cell">9</div><div class="day-cell">10</div><div class="day-cell">11</div><div class="day-cell">12</div><div class="day-cell">13</div><div class="day-cell">14</div><div class="day-cell">15</div>
                <div class="day-cell">16</div><div class="day-cell">17</div><div class="day-cell">18</div><div class="day-cell">19</div><div class="day-cell">20<span class="dot dot-red"></span></div><div class="day-cell">21</div><div class="day-cell today">22<span class="dot dot-yellow"></span></div>
                <div class="day-cell">23</div><div class="day-cell">24</div><div class="day-cell">25</div><div class="day-cell">26</div><div class="day-cell">27</div><div class="day-cell">28</div><div class="day-cell">29</div>
            </div>

            <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid var(--border); display: flex; gap: 20px;">
                <div style="display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: var(--text-dim);">
                    <div class="dot-red" style="width:8px; height:8px; border-radius:50%;"></div> Chemistry
                </div>
                <div style="display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: var(--text-dim);">
                    <div class="dot-yellow" style="width:8px; height:8px; border-radius:50%;"></div> Arabic
                </div>
            </div>
        </div>
    </main>
</body>
</html>
