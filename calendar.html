<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FlowTrackr | Week View</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f0f0f;
            --sidebar-bg: #111111;
            --accent-purple: #9d7cff;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --card-bg: #1a1a1a;
            --violet-glow: rgba(157, 124, 255, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); display: flex; min-height: 100vh; }

        /* Sidebar */
        nav { width: 280px; background-color: var(--sidebar-bg); padding: 2.5rem 1.2rem; border-right: 1px solid #222; }
        .nav-item { display: flex; align-items: center; padding: 14px 18px; border-radius: 14px; color: var(--text-dim); text-decoration: none; font-weight: 500; margin-bottom: 6px; }
        .nav-item.active { background-color: #f5f3ff; color: #7c3aed; font-weight: 700; }
        .nav-item i { margin-right: 15px; width: 20px; text-align: center; }

        /* Main Calendar Area */
        main { flex: 1; padding: 4rem 5rem; }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        
        /* Grid System (Translated from your React code) */
        .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; }
        
        .day-card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 15px;
            min-height: 160px;
            transition: 0.3s;
            cursor: pointer;
        }
        
        .day-card:hover { border-color: rgba(255,255,255,0.2); transform: translateY(-2px); }
        
        .day-card.today {
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.4);
        }

        .day-label { text-align: center; font-size: 11px; color: var(--text-dim); text-transform: uppercase; font-weight: 600; margin-bottom: 8px; }
        .day-number { 
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; 
            margin: 0 auto 12px; border-radius: 50%; font-weight: 800; font-size: 14px;
        }
        .today .day-number { background: var(--accent-purple); color: black; }

        /* Task Pills (Based on your PRIORITY_COLORS logic) */
        .task-pill {
            font-size: 10px;
            padding: 5px 8px;
            border-radius: 8px;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 600;
        }
        .task-pill.homework { background: rgba(255, 183, 3, 0.2); color: #ffb703; border: 1px solid rgba(255, 183, 3, 0.3); }
        .task-pill.task { background: rgba(157, 124, 255, 0.2); color: #9d7cff; border: 1px solid rgba(157, 124, 255, 0.3); }
        .task-pill.overdue { background: rgba(255, 77, 109, 0.2); color: #ff4d6d; border: 1px solid rgba(255, 77, 109, 0.3); }

        .empty-text { font-size: 9px; color: #444; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

    <nav>
        <div class="logo-area" style="margin-bottom: 2rem; padding-left: 10px;"><h1>FlowTrackr</h1></div>
        <div class="nav-links">
            <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-house"></i> Dashboard</a>
            <a href="planner.html" class="nav-item active"><i class="fa-solid fa-wand-magic-sparkles"></i> AI Planner</a>
            <a href="tasks.html" class="nav-item"><i class="fa-solid fa-list-ul"></i> Tasks</a>
            <a href="settings.html" class="nav-item"><i class="fa-solid fa-gear"></i> Settings</a>
        </div>
    </nav>

    <main>
        <div class="calendar-header">
            <div>
                <h2 style="font-size: 1.8rem;">Week View</h2>
                <p style="color: var(--text-dim); font-size: 0.9rem;">Reschedule by clicking a day</p>
            </div>
            <div style="background: #1a1a1a; padding: 10px 20px; border-radius: 12px; border: 1px solid #333; font-weight: 600;">
                March 2026
            </div>
        </div>

        <div class="week-grid" id="calendar-grid">
            </div>
    </main>

    <script>
        const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        const todayDate = new Date().getDate();
        const grid = document.getElementById('calendar-grid');

        // Sample Data (In a real app, this comes from your database)
        const mockTasks = [
            { day: 23, title: "Chem Worksheet", type: "homework" },
            { day: 25, title: "Arabic Presentation", type: "task" },
            { day: 22, title: "Math Quiz", type: "overdue" }
        ];

        function renderCalendar() {
            // Let's generate 7 days starting from a Monday
            for (let i = 22; i <= 28; i++) {
                const isToday = i === todayDate;
                const dayName = dayNames[(i + 1) % 7]; // Simple day mapping
                
                let taskHtml = '';
                const dayTasks = mockTasks.filter(t => t.day === i);
                
                if (dayTasks.length > 0) {
                    dayTasks.forEach(task => {
                        taskHtml += `<div class="task-pill ${task.type}">${task.title}</div>`;
                    });
                } else {
                    taskHtml = `<p class="empty-text">empty</p>`;
                }

                grid.innerHTML += `
                    <div class="day-card ${isToday ? 'today' : ''}">
                        <p class="day-label">${dayName}</p>
                        <div class="day-number">${i}</div>
                        <div class="task-list">
                            ${taskHtml}
                        </div>
                    </div>
                `;
            }
        }

        renderCalendar();
    </script>
</body>
</html>
