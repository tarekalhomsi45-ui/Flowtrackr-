<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FlowTrackr | Settings</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f0f0f;
            --sidebar-bg: #161616;
            --card-bg: #1c1c1c;
            --accent-purple: #9d7cff;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); display: flex; min-height: 100vh; }
        nav { width: 260px; background-color: var(--sidebar-bg); padding: 2rem 1rem; border-right: 1px solid #222; }
        .nav-item { display: flex; align-items: center; padding: 12px 15px; margin-bottom: 8px; border-radius: 12px; color: var(--text-dim); text-decoration: none; font-weight: 500; }
        .nav-item.active { background-color: #f5f3ff; color: #7c3aed; }

        main { flex: 1; padding: 3rem; max-width: 800px; }
        .settings-box { background: var(--card-bg); padding: 2.5rem; border-radius: 20px; border: 1px solid #333; }
        label { display: block; margin-bottom: 10px; color: var(--text-dim); font-size: 0.9rem; }
        input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #333; background: #111; color: white; margin-bottom: 20px; }
        .save-btn { background: var(--accent-purple); color: black; border: none; padding: 14px 28px; border-radius: 12px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>
    <nav>
        <div class="logo-area" style="margin-bottom: 2rem;"><h1>FlowTrackr</h1></div>
        <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-house"></i> Dashboard</a>
        <a href="tasks.html" class="nav-item"><i class="fa-solid fa-list-check"></i> Tasks</a>
        <a href="homework.html" class="nav-item"><i class="fa-solid fa-book"></i> Homework</a>
        <a href="settings.html" class="nav-item active"><i class="fa-solid fa-gear"></i> Settings</a>
    </nav>
    <main>
        <h2 style="font-size: 2.2rem; margin-bottom: 2rem;">Settings</h2>
        <div class="settings-box">
            <label>Display Name</label>
            <input type="text" id="prefName" placeholder="Enter your name">
            <label>DeepSeek API Key</label>
            <input type="password" id="prefKey" placeholder="sk-...">
            <button class="save-btn" onclick="saveSettings()">Save Configuration</button>
            <p id="status" style="margin-top: 15px; color: #00c896; display: none;">Changes saved successfully!</p>
        </div>
    </main>
    <script>
        // Load settings on page load
        document.getElementById('prefName').value = localStorage.getItem('user_name') || "";
        document.getElementById('prefKey').value = localStorage.getItem('api_key') || "";

        function saveSettings() {
            localStorage.setItem('user_name', document.getElementById('prefName').value);
            localStorage.setItem('api_key', document.getElementById('prefKey').value);
            const status = document.getElementById('status');
            status.style.display = 'block';
            setTimeout(() => status.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
