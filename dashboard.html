<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FlowTrackr | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav>
        <div class="logo-area"><h1>FlowTrackr</h1></div>
        <div class="nav-links">
            <a href="dashboard.html" class="nav-item active"><i class="fa-solid fa-house"></i> Dashboard</a>
            <a href="tasks.html" class="nav-item"><i class="fa-solid fa-list-ul"></i> Tasks</a>
            <a href="homework.html" class="nav-item"><i class="fa-solid fa-book"></i> Homework</a>
            <a href="challenge.html" class="nav-item"><i class="fa-solid fa-mobile-screen"></i> Challenge</a>
            <a href="planner.html" class="nav-item"><i class="fa-solid fa-wand-magic-sparkles"></i> AI Planner</a>
            <a href="settings.html" class="nav-item"><i class="fa-solid fa-gear"></i> Settings</a>
        </div>
    </nav>

    <main>
        <h2 class="greeting-title" id="greet">Good morning 👋</h2>
        <p class="sub-text">Here's your progress today</p>

        <div class="quote-banner">
            <i class="fa-solid fa-wand-magic-sparkles" style="color: var(--accent-purple); font-size: 1.2rem;"></i>
            <p style="color: #e0d5ff; font-style: italic;">"Success is built on daily habits, not once-in-a-lifetime effort."</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card tasks">
                <i class="fa-solid fa-list-check" style="color: #ff4d6d; font-size: 1.8rem; margin-bottom: 1.5rem; display: block;"></i>
                <span class="count">0</span>
                <span class="label">Tasks Remaining</span>
            </div>
            <div class="stat-card homework">
                <i class="fa-solid fa-book" style="color: #ffb703; font-size: 1.8rem; margin-bottom: 1.5rem; display: block;"></i>
                <span class="count">0</span>
                <span class="label">Homework Due</span>
            </div>
        </div>

        <div style="margin-top: 4rem;">
            <h3 style="font-size: 1.5rem; margin-bottom: 1.5rem;">Quick Actions</h3>
            <div style="display: flex; gap: 12px;">
                <button class="btn-plus" style="background: #1c1c1c; border: 1px solid #333; color: white;">+ Add Task</button>
                <button class="btn-plus" style="background: #1c1c1c; border: 1px solid #333; color: white;">+ Add Homework</button>
            </div>
        </div>
    </main>

    <script>
        // Use the name from the Login/Google Auth
        const name = localStorage.getItem('userName') || "User";
        
        // Dynamic Time Greeting
        const hour = new Date().getHours();
        let greetText = "Good morning";
        if(hour >= 12 && hour < 17) greetText = "Good afternoon";
        else if(hour >= 17) greetText = "Good evening";

        document.getElementById('greet').innerText = `${greetText}, ${name} 👋`;
    </script>
</body>
</html>
